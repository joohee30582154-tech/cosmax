<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>내일 네일 - 내 주변 네일샵 찾기</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&family=Jua&display=swap" />
<style>
  :root{
    --pink: #FF6FA5;
    --pink-dark: #E85590;
    --pink-light: #FFE3EE;
    --cream: #FFF8F5;
    --ink: #2D2A2E;
    --ink-soft: #7A7378;
    --line: #F1E4E9;
    --shadow: 0 8px 24px rgba(232, 85, 144, 0.16);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    background: var(--cream);
    color: var(--ink);
    overscroll-behavior: none;
  }

  #app{
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
  }

  /* ---------- Header ---------- */
  header{
    position: relative;
    z-index: 500;
    padding: 14px 16px 12px;
    background: linear-gradient(135deg, #FFFFFF 0%, #FFF1F7 45%, #FFD9EB 100%);
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    flex-shrink: 0;
    overflow-x: hidden;
  }

  .brand{
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  @keyframes logoWiggle{
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25%      { transform: translateY(-5px) rotate(-10deg); }
    50%      { transform: translateY(0) rotate(0deg); }
    75%      { transform: translateY(-2px) rotate(8deg); }
  }

  .brand .logo{
    font-size: 34px;
    line-height: 1;
    flex-shrink: 0;
    display: inline-block;
    animation: logoWiggle 2s ease-in-out infinite;
  }

  .brand h1{
    font-family: "Jua", "Noto Sans KR", sans-serif;
    font-size: 28px;
    font-weight: 400;
    margin: 0;
    letter-spacing: 0;
    color: var(--pink-dark);
    flex-shrink: 0;
  }

  .brand span.tag{
    margin-left: auto;
    font-size: 11px;
    color: var(--ink-soft);
    background: var(--pink-light);
    padding: 4px 8px;
    border-radius: 999px;
    font-weight: 600;
    flex-shrink: 0;
    white-space: nowrap;
  }

  @media (max-width: 420px){
    .brand span.tag{ display: none; }
  }

  .search-bar{
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--pink-light);
    border-radius: 14px;
    padding: 10px 14px;
    min-height: 44px;
  }

  .search-bar svg{ flex-shrink: 0; }

  .search-bar input{
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
    font-size: 16px;
    color: var(--ink);
  }
  .search-bar input::placeholder{ color: #C98BA6; }

  .filter-row{
    display: flex;
    gap: 8px;
    margin-top: 10px;
    overflow-x: auto;
    -ms-overflow-style: none;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .filter-row::-webkit-scrollbar{ display: none; }

  .chip{
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    min-height: 44px;
    padding: 0 16px;
    border-radius: 999px;
    border: 1.5px solid var(--line);
    background: #fff;
    color: var(--ink-soft);
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .chip.active{
    background: var(--pink);
    border-color: var(--pink);
    color: #fff;
  }

  .district-select{
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    min-height: 44px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1.5px solid var(--pink);
    background: #fff;
    color: var(--pink-dark);
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
  }

  /* ---------- Marker clusters ---------- */
  .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large{
    background-color: rgba(255, 111, 165, 0.35) !important;
  }
  .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div{
    background-color: var(--pink-dark) !important;
    color: #fff;
    font-weight: 700;
  }

  /* ---------- Map ---------- */
  #map-wrap{
    position: relative;
    flex: 1;
    min-height: 0;
  }

  #map{
    position: absolute;
    inset: 0;
    background: #F5EFEA;
  }

  .locate-btn{
    position: absolute;
    right: 14px;
    bottom: 14px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: #fff;
    box-shadow: var(--shadow);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 400;
  }
  .locate-btn:active{ transform: scale(0.94); }

  .result-badge{
    position: absolute;
    top: 12px;
    left: 14px;
    background: #fff;
    padding: 7px 13px;
    border-radius: 999px;
    box-shadow: var(--shadow);
    font-size: 13px;
    font-weight: 700;
    color: var(--pink-dark);
    z-index: 400;
  }

  /* ---------- Custom marker ---------- */
  .shop-marker{
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateY(0);
    transition: transform 0.15s ease;
    cursor: pointer;
  }
  .shop-marker.selected{ transform: translateY(-4px) scale(1.12); z-index: 999 !important; }

  .shop-marker .price-bubble{
    background: var(--ink);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 8px;
    white-space: nowrap;
    margin-bottom: 2px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .shop-marker.selected .price-bubble{
    background: var(--pink-dark);
  }

  .shop-marker .house{
    width: 34px;
    height: 32px;
  }

  .leaflet-popup-content-wrapper{
    border-radius: 14px;
  }
  .leaflet-popup-content{
    margin: 10px 12px;
    font-family: inherit;
  }
  .popup-top{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .popup-name{ font-weight: 900; font-size: 16px; margin-bottom: 2px; }
  .popup-fav{
    flex-shrink: 0;
    border: none;
    background: transparent;
    font-size: 18px;
    line-height: 1;
    padding: 0;
    cursor: pointer;
  }
  .popup-rating{ color: var(--ink-soft); font-size: 12.5px; margin-top: 2px; margin-bottom: 8px; }
  .popup-price-list{
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 140px;
  }
  .popup-price-row{
    display: flex;
    justify-content: space-between;
    gap: 10px;
    font-size: 13px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--line);
  }
  .popup-price-row:last-child{ border-bottom: none; padding-bottom: 0; }
  .popup-price-row span:first-child{ color: var(--ink-soft); font-weight: 600; }
  .popup-price-row span:last-child{ color: var(--pink-dark); font-weight: 800; }

  .popup-actions{
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .popup-actions .call-btn,
  .popup-actions .share-btn{
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 7px 6px;
    border-radius: 8px;
    border: none;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
  }
  .popup-actions .call-btn{ background: var(--pink); color: #fff; }
  .popup-actions .share-btn{ background: var(--pink-light); color: var(--pink-dark); }

  /* ---------- Bottom shop list ---------- */
  #sheet{
    position: relative;
    z-index: 500;
    flex-shrink: 0;
    background: var(--cream);
    padding: 10px 0 10px;
    max-height: 40vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .sheet-handle{
    display: none;
  }

  .card-row{
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 0 14px;
    scroll-snap-type: x proximity;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .card-row::-webkit-scrollbar{ display: none; }

  .no-results{
    width: 100%;
    padding: 24px 14px;
    text-align: center;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink-soft);
  }

  .shop-card{
    flex-shrink: 0;
    width: 158px;
    scroll-snap-align: start;
    background: #fff;
    border-radius: 16px;
    padding: 0;
    overflow: hidden;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .shop-card.active{
    border-color: var(--pink);
    transform: translateY(-2px);
  }

  .shop-card .thumb{
    position: relative;
    width: 100%;
    height: 188px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    overflow: hidden;
  }

  .shop-card .thumb img{
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .shop-card .fav-btn{
    position: absolute;
    top: 6px;
    left: 6px;
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    background: rgba(255,255,255,0.85);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    z-index: 2;
    padding: 0;
  }

  .shop-card .card-body{
    padding: 7px 10px 9px;
  }

  .shop-card .name{
    font-size: 13.5px;
    font-weight: 800;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .shop-card .meta{
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .shop-card .meta .stars{ color: #F5A623; font-weight: 700; }
  .shop-card .price{
    font-size: 13.5px;
    font-weight: 800;
    color: var(--pink-dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ---------- Review section ---------- */
  .section-title{
    font-size: 14px;
    font-weight: 800;
    padding: 10px 14px 6px;
  }

  .review-row{
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding: 0 14px;
    scroll-snap-type: x proximity;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .review-row::-webkit-scrollbar{ display: none; }

  .review-card{
    flex-shrink: 0;
    width: 220px;
    scroll-snap-align: start;
    background: #fff;
    border-radius: 14px;
    padding: 10px 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
  }

  .review-card .review-top{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 5px;
  }
  .review-card .review-title{
    font-size: 14px;
    font-weight: 800;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .review-card .review-rating{
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 700;
    color: #F5A623;
  }
  .review-card .review-desc{
    font-size: 12.5px;
    color: var(--ink-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 8px;
  }
  .review-card .review-tags{
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .review-card .review-tags .tag{
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--pink-light);
    color: var(--pink-dark);
    white-space: nowrap;
  }

  @media (min-width: 700px){
    header{ padding: 18px 28px 14px; }
    .brand h1{ font-size: 34px; }
    .brand .logo{ font-size: 40px; }
    #sheet{ padding: 14px 0 18px; }
    .card-row{ padding: 0 24px; }
    .shop-card{ width: 190px; }
    .shop-card .thumb{ height: 226px; font-size: 38px; }
    .section-title{ padding: 18px 24px 8px; }
    .review-row{ padding: 0 24px; }
    .review-card{ width: 240px; }
    .result-badge{ left: 24px; }
    .locate-btn{ right: 24px; bottom: 24px; }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand">
      <span class="logo">💅</span>
      <h1>내일 네일</h1>
      <span class="tag">지도로 보는 네일샵</span>
    </div>
    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#E85590" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="샵 이름이나 지역으로 검색" />
    </div>
    <div class="filter-row" id="filterRow">
      <select class="district-select" id="districtSelect"><option value="all">전체 지역</option></select>
      <button class="chip active" data-filter="all">전체</button>
      <button class="chip" data-filter="low">2만원대</button>
      <button class="chip" data-filter="mid">3만원대</button>
      <button class="chip" data-filter="high">4만원대+</button>
      <button class="chip" data-filter="rating">평점 높은순</button>
      <button class="chip" data-filter="fav">❤️ 찜한 샵</button>
    </div>
  </header>

  <div id="map-wrap">
    <div id="map"></div>
    <div class="result-badge" id="resultBadge">500개의 네일샵</div>
    <button class="locate-btn" id="locateBtn" title="내 위치">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#E85590" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
    </button>
  </div>

  <div id="sheet">
    <div class="card-row" id="cardRow"></div>

    <div class="section-title" id="reviewSectionTitle">💬 이용 후기</div>
    <div class="review-row" id="reviewRow"></div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
  // ---- 가상 데이터 생성 (서울 25개 구, 프로토타입용 목업 데이터) ----
  // 실제 매장 정보가 아닙니다. 이름/좌표/가격은 알고리즘으로 생성한 예시 데이터입니다.
  function mulberry32(seed){
    return function(){
      seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
      let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const rand = mulberry32(20260707);

  const districts = [
    { name: "강남구", lat: 37.5172, lng: 127.0473 }, { name: "강동구", lat: 37.5301, lng: 127.1238 },
    { name: "강북구", lat: 37.6396, lng: 127.0257 }, { name: "강서구", lat: 37.5509, lng: 126.8495 },
    { name: "관악구", lat: 37.4784, lng: 126.9516 }, { name: "광진구", lat: 37.5384, lng: 127.0822 },
    { name: "구로구", lat: 37.4954, lng: 126.8874 }, { name: "금천구", lat: 37.4569, lng: 126.8956 },
    { name: "노원구", lat: 37.6542, lng: 127.0568 }, { name: "도봉구", lat: 37.6688, lng: 127.0471 },
    { name: "동대문구", lat: 37.5744, lng: 127.0396 }, { name: "동작구", lat: 37.5124, lng: 126.9393 },
    { name: "마포구", lat: 37.5637, lng: 126.9084 }, { name: "서대문구", lat: 37.5791, lng: 126.9368 },
    { name: "서초구", lat: 37.4837, lng: 127.0324 }, { name: "성동구", lat: 37.5633, lng: 127.0371 },
    { name: "성북구", lat: 37.5894, lng: 127.0167 }, { name: "송파구", lat: 37.5145, lng: 127.1059 },
    { name: "양천구", lat: 37.5170, lng: 126.8664 }, { name: "영등포구", lat: 37.5264, lng: 126.8963 },
    { name: "용산구", lat: 37.5324, lng: 126.9900 }, { name: "은평구", lat: 37.6027, lng: 126.9291 },
    { name: "종로구", lat: 37.5729, lng: 126.9794 }, { name: "중구", lat: 37.5641, lng: 126.9979 },
    { name: "중랑구", lat: 37.6063, lng: 127.0925 },
  ];

  const NAME_PREFIXES = [
    "핑크젤", "코코", "리틀하우스", "블랑", "데이지", "모먼트", "소소한", "버터플라이", "글로우", "쥬얼리",
    "라라", "미미", "하트", "벨라", "로즈", "마이", "스윗", "러블리", "나비", "몽블랑",
    "크리스탈", "오로라", "별빛", "달빛", "포엠", "아이비", "라벤더", "체리", "리본", "플로라",
    "유니크", "라온", "세라", "앤젤", "클로버", "봄날", "소울", "뮤즈", "이든", "하니",
  ];
  const NAME_SUFFIXES = ["네일", "네일샵", "네일살롱", "네일아트", "네일스튜디오", "네일하우스", "네일랩", "네일바"];

  function pick(arr){ return arr[Math.floor(rand() * arr.length)]; }

  function generateShops(count){
    const list = [];
    for (let i = 0; i < count; i++){
      const d = pick(districts);
      const lat = d.lat + (rand() - 0.5) * 0.03;
      const lng = d.lng + (rand() - 0.5) * 0.03;

      const tierRoll = rand();
      let price;
      if (tierRoll < 0.35) price = 18000 + Math.floor(rand() * 10) * 1000;       // 2만원대 위주
      else if (tierRoll < 0.75) price = 28000 + Math.floor(rand() * 12) * 1000;  // 3만원대 위주
      else price = 40000 + Math.floor(rand() * 25) * 1000;                       // 4만원대 이상

      let name = pick(NAME_PREFIXES) + " " + pick(NAME_SUFFIXES);
      if (rand() < 0.3) name += " " + d.name.replace("구", "") + "점";

      const gelNail = price;
      const gelPedi = gelNail + 3000 + Math.floor(rand() * 6) * 1000;
      const basicCare = Math.round((gelNail * (0.45 + rand() * 0.15)) / 1000) * 1000;
      const monthlyArt = 15000 + Math.floor(rand() * 8) * 1000;
      const phone = `02-${1000 + Math.floor(rand() * 9000)}-${1000 + Math.floor(rand() * 9000)}`;

      list.push({
        id: i + 1,
        name,
        area: d.name,
        lat, lng, price, phone,
        gelNail, gelPedi, basicCare, monthlyArt,
        rating: Math.round((3.6 + rand() * 1.4) * 10) / 10,
      });
    }
    return list;
  }

  const shops = generateShops(500);
  document.getElementById('districtSelect').insertAdjacentHTML(
    'beforeend',
    districts.map(d => `<option value="${d.name}">${d.name}</option>`).join('')
  );

  // ---- 지도 초기화 ----
  const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([37.5326, 127.0090], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
  }).addTo(map);
  L.control.zoom({ position: 'bottomleft' }).addTo(map);

  const clusterGroup = L.markerClusterGroup({ maxClusterRadius: 55, spiderfyOnMaxZoom: true, showCoverageOnHover: false });
  map.addLayer(clusterGroup);

  const houseSVG = `
    <svg class="house" viewBox="0 0 40 38" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 3 L36 16 V34 C36 35.1 35.1 36 34 36 H6 C4.9 36 4 35.1 4 34 V16 Z" fill="#FFF8F5" stroke="#E85590" stroke-width="2"/>
      <path d="M2 18 L20 3 L38 18" fill="none" stroke="#FF6FA5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="15.5" y="21" width="9" height="15" rx="2" fill="#FF6FA5"/>
      <circle cx="20" cy="28.5" r="1.3" fill="#FFF8F5"/>
      <circle cx="11" cy="19" r="2.6" fill="#FFE3EE" stroke="#E85590" stroke-width="1.4"/>
    </svg>`;

  function priceTier(p){
    if (p <= 28000) return 'low';
    if (p <= 40000) return 'mid';
    return 'high';
  }

  function formatPrice(p){
    return '₩' + p.toLocaleString();
  }

  const THUMB_GRADIENTS = [
    'linear-gradient(135deg, #FFD6E8, #FFB6D9)',
    'linear-gradient(135deg, #FDEBFF, #F3C7FF)',
    'linear-gradient(135deg, #FFF0E5, #FFD1A6)',
    'linear-gradient(135deg, #FFF5D6, #FFE49C)',
    'linear-gradient(135deg, #E9FBEF, #BEF0D2)',
    'linear-gradient(135deg, #E5F6FF, #C7E9FF)',
  ];
  // 로컬 저장된 네일아트 사진 (image/ 폴더, 27장)
  const THUMB_PHOTO_COUNT = 42;
  const THUMB_PHOTOS = Array.from({ length: THUMB_PHOTO_COUNT }, (_, i) =>
    `image/nail-${String(i + 1).padStart(2, '0')}.jpg`
  );

  function thumbFor(shop){
    return {
      gradient: THUMB_GRADIENTS[shop.id % THUMB_GRADIENTS.length],
      imageUrl: THUMB_PHOTOS[shop.id % THUMB_PHOTOS.length],
    };
  }

  const markers = {};
  let activeId = null;

  // ---- 즐겨찾기 (localStorage에 저장) ----
  const FAV_KEY = 'nailFavorites_v1';
  function loadFavorites(){
    try { return new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]')); }
    catch (e) { return new Set(); }
  }
  const favorites = loadFavorites();

  function saveFavorites(){
    localStorage.setItem(FAV_KEY, JSON.stringify([...favorites]));
  }

  function updateFavButtons(id){
    const isFav = favorites.has(id);
    document.querySelectorAll(`[data-fav-id="${id}"]`).forEach(el => {
      el.classList.toggle('active', isFav);
      el.textContent = isFav ? '❤️' : '🤍';
    });
  }

  window.toggleFavorite = function(id){
    if (favorites.has(id)) favorites.delete(id);
    else favorites.add(id);
    saveFavorites();
    updateFavButtons(id);
    if (currentFilter === 'fav') applyFilters();
  };

  window.shareShop = function(id){
    const shop = shops.find(s => s.id === id);
    if (!shop) return;
    const text = `[내일 네일] ${shop.name} (${shop.area}) - 젤네일 ${formatPrice(shop.gelNail)}부터`;
    if (navigator.share){
      navigator.share({ title: shop.name, text, url: location.href }).catch(() => {});
    } else if (navigator.clipboard){
      navigator.clipboard.writeText(`${text}\n${location.href}`)
        .then(() => alert('공유 문구가 복사되었어요! 카카오톡에 붙여넣어 보내보세요 💌'))
        .catch(() => alert('복사에 실패했어요. 다시 시도해주세요.'));
    } else {
      alert(text);
    }
  };

  function priceListHTML(shop){
    const rows = [
      ['젤네일', shop.gelNail],
      ['젤패디', shop.gelPedi],
      ['기본관리', shop.basicCare],
      ['이달의 아트', shop.monthlyArt],
    ];
    return rows.map(([label, value]) =>
      `<div class="popup-price-row"><span>${label}</span><span>${formatPrice(value)}</span></div>`
    ).join('');
  }

  function popupHTML(shop){
    const isFav = favorites.has(shop.id);
    return `<div class="popup-top">
         <div class="popup-name">${shop.name}</div>
         <button class="popup-fav${isFav ? ' active' : ''}" data-fav-id="${shop.id}" onclick="event.stopPropagation(); toggleFavorite(${shop.id})">${isFav ? '❤️' : '🤍'}</button>
       </div>
       <div class="popup-rating">⭐ ${shop.rating} · ${shop.area}</div>
       <div class="popup-price-list">${priceListHTML(shop)}</div>
       <div class="popup-actions">
         <a class="call-btn" href="tel:${shop.phone}">📞 전화하기</a>
         <button class="share-btn" onclick="shareShop(${shop.id})">🔗 공유하기</button>
       </div>`;
  }

  shops.forEach(shop => {
    const icon = L.divIcon({
      className: 'shop-marker-icon',
      html: `<div class="shop-marker" data-id="${shop.id}">
               <div class="price-bubble">${formatPrice(shop.price)}</div>
               ${houseSVG}
             </div>`,
      iconSize: [50, 60],
      iconAnchor: [25, 40],
      popupAnchor: [0, -36]
    });

    const marker = L.marker([shop.lat, shop.lng], { icon });
    marker.bindPopup(popupHTML(shop));
    // 즐겨찾기 상태가 바뀐 뒤 팝업을 다시 열어도 최신 상태로 보이도록 매번 내용을 새로 채움
    marker.on('popupopen', () => marker.setPopupContent(popupHTML(shop)));
    marker.on('click', () => selectShop(shop.id, false));
    markers[shop.id] = marker;
    clusterGroup.addLayer(marker);
  });

  // ---- 하단 카드 리스트 ----
  const cardRow = document.getElementById('cardRow');
  const resultBadge = document.getElementById('resultBadge');

  const CARD_LIMIT = 40;

  function renderCards(list, totalCount){
    cardRow.innerHTML = '';

    if (totalCount === 0){
      cardRow.innerHTML = `<div class="no-results">🔍 검색 결과가 없습니다</div>`;
      resultBadge.textContent = '0개의 네일샵';
      return;
    }

    list.forEach(shop => {
      const card = document.createElement('div');
      card.className = 'shop-card' + (shop.id === activeId ? ' active' : '');
      card.dataset.id = shop.id;
      const thumb = thumbFor(shop);
      card.innerHTML = `
        <div class="thumb" style="background:${thumb.gradient}">
          <img src="${thumb.imageUrl}" alt="${shop.name}" loading="lazy" onerror="this.remove()" />
          <button class="fav-btn${favorites.has(shop.id) ? ' active' : ''}" data-fav-id="${shop.id}" onclick="event.stopPropagation(); toggleFavorite(${shop.id})">${favorites.has(shop.id) ? '❤️' : '🤍'}</button>
        </div>
        <div class="card-body">
          <div class="name">${shop.name}</div>
          <div class="meta">${shop.area} · <span class="stars">⭐ ${shop.rating}</span></div>
          <div class="price">젤네일 ${formatPrice(shop.price)}</div>
        </div>
      `;
      card.addEventListener('click', () => selectShop(shop.id, true));
      cardRow.appendChild(card);
    });
    resultBadge.textContent = totalCount > list.length
      ? `${totalCount}개의 네일샵 (리스트 상위 ${list.length}개 표시)`
      : `${totalCount}개의 네일샵`;
  }

  function selectShop(id, fromCard){
    activeId = id;
    const shop = shops.find(s => s.id === id);
    if (!shop) return;

    document.querySelectorAll('.shop-marker').forEach(el => el.classList.remove('selected'));
    const markerEl = document.querySelector(`.shop-marker[data-id="${id}"]`);
    if (markerEl) markerEl.classList.add('selected');

    document.querySelectorAll('.shop-card').forEach(el => {
      el.classList.toggle('active', Number(el.dataset.id) === id);
    });

    showShopReviews(shop);

    if (fromCard){
      clusterGroup.zoomToShowLayer(markers[id], () => markers[id].openPopup());
    } else {
      const cardEl = cardRow.querySelector(`.shop-card[data-id="${id}"]`);
      if (cardEl) cardEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
  }

  // ---- 필터 ----
  const filterRow = document.getElementById('filterRow');
  const districtSelect = document.getElementById('districtSelect');
  let currentFilter = 'all';

  function getFilteredShops(){
    const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    const district = districtSelect.value;

    let list = shops.filter(s =>
      (district === 'all' || s.area === district) &&
      (s.name.toLowerCase().includes(keyword) || s.area.toLowerCase().includes(keyword))
    );

    if (currentFilter === 'low' || currentFilter === 'mid' || currentFilter === 'high'){
      list = list.filter(s => priceTier(s.price) === currentFilter);
    } else if (currentFilter === 'rating'){
      list = [...list].sort((a, b) => b.rating - a.rating);
    } else if (currentFilter === 'fav'){
      list = list.filter(s => favorites.has(s.id));
    }
    return list;
  }

  // 현재 지도에 보이는 영역(bounds) 안의 샵만 하단 카드에 표시
  function refreshCardsInView(baseList){
    const list = baseList || getFilteredShops();
    const bounds = map.getBounds();
    const visible = list.filter(s => bounds.contains([s.lat, s.lng]));
    renderCards(visible.slice(0, CARD_LIMIT), visible.length);
  }

  function applyFilters(){
    const list = getFilteredShops();
    clusterGroup.clearLayers();
    list.forEach(s => clusterGroup.addLayer(markers[s.id]));
    refreshCardsInView(list);
  }

  filterRow.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    filterRow.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    applyFilters();
  });

  const searchInputEl = document.getElementById('searchInput');
  searchInputEl.addEventListener('input', applyFilters);
  searchInputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.isComposing){
      applyFilters();
      searchInputEl.blur();
    }
  });
  districtSelect.addEventListener('change', applyFilters);

  // 마우스 스크롤/드래그로 지도를 확대·이동하면 그 지역 샵으로 카드 목록 갱신
  map.on('moveend', () => refreshCardsInView());

  // ---- 내 위치 버튼 ----
  document.getElementById('locateBtn').addEventListener('click', () => {
    if (!navigator.geolocation){
      alert('이 브라우저에서는 위치 확인이 지원되지 않아요.');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => {
        map.flyTo([pos.coords.latitude, pos.coords.longitude], 14);
      },
      () => alert('위치 정보를 가져올 수 없어요. 위치 권한을 확인해 주세요.')
    );
  });

  // ---- 이용 후기 (샘플 데이터) ----
  const sampleReviews = [
    { nickname: "지은맘",      rating: 5, content: "손이 많이 건조한데 큐티클 정리를 꼼꼼하게 해주셔서 좋았어요. 2주 지나도 안 깨져서 재방문할 예정이에요!", tags: ["꼼꼼한 케어", "재방문 예정"] },
    { nickname: "minsu_j",    rating: 4, content: "손이 빠르고 예쁘게 잘해주시는데 예약보다 15분 정도 기다렸어요.", tags: ["대기시간 있음"] },
    { nickname: "별사탕",      rating: 5, content: "이달의 아트 가격이 착한데 퀄리티가 진짜 좋았어요! 위생 관리도 철저하세요.", tags: ["가성비", "위생 굿"] },
    { nickname: "yuna.b",     rating: 3, content: "디자인은 예쁘게 나왔는데 가격이 안내받은 것보다 5천원 더 나와서 조금 당황했어요.", tags: ["가격 안내 필요"] },
    { nickname: "초코라떼",     rating: 5, content: "손톱이 얇아서 잘 부러지는데 여기서 받고 3주 넘게 하나도 안 깨졌어요!", tags: ["오래 유지", "강력추천"] },
    { nickname: "뽀시래기",     rating: 2, content: "네일아트는 만족스러웠는데 매장이 좁고 좀 시끄러웠어요.", tags: ["매장 협소"] },
    { nickname: "haeun_nail", rating: 5, content: "젤페디까지 같이 받았는데 발 마사지도 꼼꼼해서 힐링됐어요.", tags: ["젤페디 추천", "힐링"] },
    { nickname: "민지언니",     rating: 4, content: "원하는 디자인 사진을 보여드리니 거의 똑같이 해주셨어요.", tags: ["디자인 재현력"] },
    { nickname: "sujin.k",    rating: 1, content: "예약하고 갔는데 30분 넘게 기다렸어요. 시공 자체는 괜찮았어요.", tags: ["대기시간 30분"] },
    { nickname: "달콤바닐라",   rating: 5, content: "기본관리만 받아도 손이 확실히 정돈된 느낌이에요! 가격도 합리적이에요.", tags: ["가격 합리적", "기본관리 추천"] },
  ];

  function renderReviews(list){
    const reviewRow = document.getElementById('reviewRow');
    reviewRow.innerHTML = list.map(r => `
      <div class="review-card">
        <div class="review-top">
          <div class="review-title">${r.nickname}</div>
          <div class="review-rating">⭐ ${r.rating}.0</div>
        </div>
        <div class="review-desc">${r.content}</div>
        <div class="review-tags">${r.tags.map(t => `<span class="tag">#${t}</span>`).join('')}</div>
      </div>
    `).join('');
  }

  // 샵마다 다른 조합이 나오도록 id 기반으로 후기 풀에서 3개를 골라 배정 (샘플 데이터이므로 실제 후기가 아님)
  function reviewsFor(shop){
    const n = sampleReviews.length;
    const start = shop.id % n;
    const picks = [start, (start + 3) % n, (start + 6) % n];
    return picks.map(i => sampleReviews[i]);
  }

  function showShopReviews(shop){
    document.getElementById('reviewSectionTitle').textContent = `💬 ${shop.name} 이용 후기`;
    renderReviews(reviewsFor(shop));
  }

  renderReviews(sampleReviews);

  applyFilters();
</script>
</body>
</html>
